body:
  text: 龍川詞補遺䟦余正喜同甫不作妖語媚語偶閲中興詞選得水龍吟以後七闋亦未能超然但無一調合本集者或云贋作葢花菴與同甫俱南渡後人何至誤謬若此或花菴專選綺艷一種而同甫子沈所編本集特表阿翁磊落骨幹故若出二手况本集云詞選則知同甫之詞不止於三十闋即補此花菴所選亦安得云全豹耶姑梓之以俟博雅君子湖南毛晉又識
