body:
  text: 龍川詞跋同甫一名同永康人光宗策進士羣臣奏其卷第三御筆擢第一既知為同甫大喜又有天留遺朕之詔其恩遇如此據葉水心序其集云四十卷今行本止三十卷想尚多佚遺其最著者莫如上皇帝四書及酌古論自贊云人中之龍文中之虎真無忝矣第本集載詞選三十闋無甚詮次如寄辛幼安賀新郎三首錯見前後豫家藏龍川詞一卷又每調類分未知孰是讀至卷終不作一妖語媚語殆所稱不受人憐者歟湖南毛晉識
