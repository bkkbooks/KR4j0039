front:
  text: 龍川詞補遺
  hash: sha256:9750a8005d93190ca5ac0cb7997184aa24d9075c52c072ceb608d15fb55e36d5
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4j0039_WYG_003-1a}
body:
  text: 水龍吟春恨閙花深處層樓畫簾半捲東風軟春歸翠陌平莎茸嫩垂楊金淺遲日催花淡雲閣雨輕寒輕暖恨芳菲世界游人未嘗都付與鶯和燕寂莫憑髙念逺向南樓一聲歸雁金叉鬭草青絲勒馬風流雲散羅綬分香翠綃封淚幾多幽怨正銷魂又是疏煙淡月子規聲斷洞仙歌雨瑣窗秋莫夢髙唐人困獨立西風萬千恨又檐花落處滴碎空階芙容院無限秋容老盡枯荷摧欲折多少離聲鎖斷天涯訴幽悶似蓬山去後方士來時揮粉淚㸃㸃梨花香潤斷送得人間夜霖鈴更葉落梧桐孤燈成暈虞美人春愁東風蕩揚輕雲縷時送蕭蕭雨水邊臺榭燕新歸一口香泥濕帶落花飛海棠糝徑鋪香繡依舊成春瘦黃昏庭院栁啼鴉記得那人和月折梨花眼兒媚春愁試燈天氣又春來難說是情懷寂寥聊似揚州何遜不為江梅扶頭酒醒爐香灺心緒未全灰愁人最是黃昏前後煙雨樓臺思佳客春感花拂闌干栁拂空花枝綽約栁鬟鬆蝶翻淡碧低邊影鶯囀濃香杪處風深院落小簾櫳尋芳猶憶舊相逢橋邊攜手歸來路踏皺殘花幾片紅清平樂秋晚伯成兄往龍興山中意其登山臨水不無閨房之思作此詞惱之銀屏繡閣不道鮫綃薄嘶騎囱囱塵漠漠還過夕陽村落亂山千叠無情今宵遮斷愁人兩處香消夢覺一般曉月秋聲滴滴金斷橋雪霽聞啼鳥對林花弄晴曉畫角吹香客愁醒見梢頭紅小團酥剪蠟知多少向風前壓春倒江嶂人煙畫圖中有短篷香繞
