body:
  text: 龍川詞宋陳亮撰水調歌頭送章德茂大卿使金不見南師久謾説北羣空當場隻手畢竟還我萬夫雄自笑堂堂漢使得似洋洋河水依舊只流東且復穹廬拜會向藳街逢堯之都舜之壤禹之封于中應有一個半個挽雕弓萬里烽煙如許千古英靈安在磅礴幾時通世運何須問赫日自當中又癸卯九月十五日壽朱元晦人物從來少籬菊為誰黃去年今日倚樓還是聽行藏未覺霜風無賴好在月華如水心事楚天長講論參洙泗杯酒到虞唐人未醉歌宛轉興悠揚太平胸次笑他磊磈欲成狂且向武夷深處坐對雲煙開斂逸思入微茫我欲為君夀何許得新腔又和吳允成逰靈洞韻人愛新來景龍認舊時湫不論三伏小住便覺凛生秋我自醉眠其上任是水流其下湍激若為收世事如斯去不去為誰留本無心隨所寓觸虗舟東山始末且向靈洞與沈浮料得神仙窟穴爭似提封萬里大小幾琉球但有君才具何用問時流又和趙周錫事業隨人品今古幾麾旌向來謀國萬事盡出汝書生安識鵾鵬變化九萬里風在下如許上南溟斥鷃旁邊笑河漢一頭傾嘆世間多少恨幾時平霸圖消歇大家創見又成驚邂逅漢家龍種正爾烏紗白紵馳騖覺身輕樽酒從渠説雙眼為誰明念奴嬌至金陵江南春色算來是多少勝遊清賞妖冶廉纖只做得飛鳥向人偎傍地闢天開精神朗慧到底還京樣人家小語一聲聲近清唱因念舊日山城個人如畫已作中州想鄧禹笑人無限也冷落不堪惆悵秋水雙明高山一弄著我些悲壯南徐好住片帆有分來往又登多景樓危樓還望嘆此意今古幾人曾會鬼設神施渾認作天限南疆圵界一水橫陳連岡三面做出爭雄勢六朝何事只成門戶私計因笑王謝諸人登髙懷逺也學英雄涕憑却江山管不到河洛祲氛無際正好長驅不須反顧尋取中流誓小兒破賊勢成寧問強對又送戴少望參選西風帶暑又還是長途利牽名役我已無心君因甚更把青衫為客邂逅卑飛幾時高舉不露真消息大家行處到頭須管行得何處尋取狂徒可能著意更問渠儂骨天上人間最好是閙裏一般岑寂瀛海無波玉堂有路穩著青霄翼歸來何事眼光依舊生碧賀新郎同劉元實唐與正陪葉丞相飲修竹更深處映簾櫳清陰障日坐來無暑水激泠泠知何許跳碎危欄玉樹都不繫人間朝莫東閣少年今老矣況樽中有酒嫌推去猶著我名流語大家緑野陪容與算等間過了薰風又還商素手弄柔條人健否猶憶當時雅趣恩未報恐成辜負舉目江河休感涕念有君如此應忘阻歌未罷誰來舞又寄辛幼安和見懷韻老去慿誰説看幾番神奇臭腐夏裘冬葛父老長安今餘幾後死無讐可雪猶未燥當時生髮二十五弦多少恨算世間那有平分月羌婦弄漢宫瑟樹猶如此堪重别只使君從來與我話頭多合行矣置之無足問誰換妍皮癡骨但莫使伯牙絃絶九轉丹砂牢拾取管精金只是鐵龍共虎聲應裂又酬辛幼安再用韻見寄離亂從頭説愛吾民金繒不愛蔓藤纍葛壯筆盡消人脆好冠蓋陰山觀雪虧殺我一星星髮涕出女吳成倒轉問魯為齊弱何年月丘也幸由之瑟斬新換出旗麾别把當時一樁大義拆開收合據地一呼吾往矣萬里搖肢動骨這話霸只成癡絶天地洪爐誰扇鞲算于中安得長堅鐵淝水破關東裂又懷辛幼安用前韻話殺渾間説不成教齊民也解為伊為葛樽酒相逢成二老却憶去年風雪新著了幾莖華髮百世尋人猶接踵嘆只今兩地三人月寫舊恨向誰瑟男兒何用傷離别況古來幾畨際會風從雲合千里情親長晤對妙體本心次骨臥百尺髙樓斗絶天下適安耕且老看買犁賣劎平家鐵壯士淚肺肝裂滿江紅懷韓子師尚書曾洗乾坤問何事雄圖頓屈試著眼階除當下又添英物圵向爭衡幽憤在南來遺恨狂酋失算淒涼部曲幾人存三之一諸老盡郎君出恩未報家何恤念橫飛直上有時還戢笑我只知存飽暖感君原不論階級休更上百尺舊家樓塵侵帙桂枝香觀木樨有感寄呂郎中天高氣肅正月色分明秋容新沐桂子初收三十六宫都足不辭散落人間去怕羣花自嫌凡俗向他秋晚喚回春意幾曾幽獨是天公餘香賸馥怪一樹香風十里相續坐對花旁但見色浮金粟芙蓉只解添愁思況東籬凄涼黃菊入時太淺背時太逺愛尋髙躅三部樂七月送丘宗卿使金小屈穹廬但二滿三平共勞均佚人中龍虎本為明時而出只合是端坐王朝看指揮整辦掃蕩飄忽也持漢節聊過舊家宫室西風又還帶暑把征衫著上有時披拂休將看花淚眼聞絃病骨對遺民有如皎日行萬里依然故物入奏幾䇿天下裏終定于一又七月草六日壽王道甫入腳西風漸去去來來早三之一春花無數畢竟何如秋實不須待名品如麻試為君屈指是誰層出十朝半月爭看摶空霜鶻從來别真共假任盤根錯節更饒倉卒還他濟時好手封侯奇骨沒些兒媻姍勃窣也不是崢嶸突兀百二十歲管做徹元分人物瑞雪濃慢六月十一日壽羅春伯蔗漿酪粉玉壺氷醑朝罷更聞宣賜去天咫尺下拜再三幸今有母可遺年年此日共道月入懷中最貴向暑天正風雲會遇有恁嘉瑞鶴沖霄魚得水一超便直入神仙地植根江表開拓兩河做得黑頭公未騎鯨赤手問何如長鞭尺箠向來王謝風流只今管是阮郎歸重午壽外舅波光渺渺浸晴陂有亭湖岸西芰荷香拂栁絲垂升堂獻壽巵紅約腕緑侵衣願祝屇期頤花間妙語欲無詩一年歌一詞祝英臺近六月十一日送葉正則如江陵駕扁舟衝劇暑千里江上去夜宿晨興一一舊時路百年忘了旬頭被人攙破故紙裏是爭雄處怎生訴欲待細與分疏其如有憑據包裹生魚活底怎遭遇相逢樽酒何時征衫容易君去也自家須住又九月一日壽俞德載嫩寒天金氣雨攬斷一秋事全樣霏微還作小晴意世間萬寶都成些兒無欠只待與黃花為地好招致對此鬱鬱蔥蔥新篘未成醉番手為雲造物等兒戲也知冨貴來時一班呈露便做出人中祥瑞蝶戀花甲辰夀元晦手撚黃花還自笑笑比淵明莫也歸來早隨世功名渾草草五湖却共繁華老冷淡家生寃得道旖旎妖嬈春夢如今覺管領歲華須到了此花之後花應少卜算子九月十八日夀徐子才悄靜菊花天洗盡梧桐雨倍九周遭爛漫開祝壽當頭取頂戴御袍黃疉秀金稜吐仙種花容晚節香人願爭先覩垂絲釣九月七日自壽菊花細雨蕭蕭紅蓼汀渚景物漸幽風致如許秋未莫又值吾初度看天宇正澄淸欲往登髙未也紅塵當面飛舞幾人吊古烏帽牢收取短髮還羞覷遐壽身近五雲深處彩鳯飛一作彩鳯舞伯七月十六日壽錢同人立玉天如水特地如何撰海南沈燒著欲寒猶暖算從頭有多少厚德陰功人家上一一舊時香案煞經慣小駐吾州才爾依然歡聲滿莫也教公子王孫眼見這些兒頴脫處髙出書卷經綸自入手不了判斷鷓鴣天懷王道甫落魄行歌記昔逰頭顱如許尚何求心肝吐盡無餘事口腹安然豈逺謀才怕暑又傷秋天涯夢斷有書不大都眼孔新來淺羡爾微官作計周謁金門送徐子宜如新安新雨足洗盡山城袢溽見説好峯三十六峯峯如立玉四海英逰追逐事業相時伸縮入境德星須做福只愁金詔趣天仙子七月十五日壽內一夜秋光先著栁暑力平明羞失守西風不放入簾幃饒永晝沈煙透半月十朝秋定否指點芙蕖凝佇久髙處成蓮深處藕百年長共月團圎女進酒男稱夀一點浮雲人似舊洞仙歌丁未夀朱元晦秋容一洗不受凡塵涴許大乾坤這回大向上頭些子是雕鶚摶空籬底下只有黃花幾朵騎鯨汗漫那得人同坐赤手丹心撲不破問唐虞禹湯武多少功名猶自是一點浮雲鏟過且燒却一瓣海南沈任拈取千年陸沈竒貨踏莎行懷葉八十推官書册如仇舊逰渾諱有懷不斷人應異千山上去夢魂輕片帆似下蠻溪水已共酒杯長堅海見君忽忘花前醉從來解事苦無多不知解到毫芒未南鄉子謝永嘉諸友相餞人物滿東甌别我江心識俊逰北盡平蕪南似畫中流誰繫龍驤萬斛舟去去幾時休猶是潮來更上頭醉墨淋漓人感舊離愁一夜西風似夏不點絳唇詠梅月一夜相思水邊清淺橫枝瘦小窗如晝情共香俱透清入夢魂千里人長久君知否雨僝雲僽格調還依舊龍川詞
